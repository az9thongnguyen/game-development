<!doctype html>
<!-- =========================================================================
     baas/web/dashboard.html  —  the Game BaaS operator dashboard (Slice #5)
     -------------------------------------------------------------------------
     A single hand-written page (vanilla JS, no framework, no external assets),
     served by the baas at /dashboard. It drives the admin API:
       • Platform: create/list projects (X-Admin-Secret).
       • Project console: config, live events, analytics, users, leaderboard
         (X-Api-Key + X-Secret-Key). Keys live only in localStorage; never logged.
     Same-origin with the API (served by the baas) so no CORS.
     ========================================================================= -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Game BaaS — Dashboard</title>
<style>
  /* Design tokens — mirror engine/ui/theme.hpp ("modern dark + one accent"). */
  :root {
    color-scheme: dark;
    --bg:#12141C; --elevated:#1B1E28; --surface:#2A2F3C; --surface-hover:#353B4A;
    --surface-press:#454C5E; --border:#2A2E3A; --field:#14171F;
    --text:#E6E9F0; --dim:#A8AEBE; --muted:#6B7180; --on-accent:#0B1017;
    --accent:#5AAAE6; --accent-hover:#82C8FF; --accent-press:#3E86BE;
    --accent-soft:rgba(90,170,230,.16);
    --success:#4CC38A; --warn:#E5B454; --danger:#E5657A;
    --r-sm:6px; --r-md:10px;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text);
         font:14px/1.55 var(--sans); -webkit-font-smoothing:antialiased; }

  /* Header */
  header { position:sticky; top:0; z-index:5; padding:14px 24px; background:rgba(18,20,28,.85);
           backdrop-filter:blur(8px); border-bottom:1px solid var(--border); }
  .bar { display:flex; align-items:center; gap:12px; max-width:1040px; margin:0 auto; }
  .dot { width:10px; height:10px; border-radius:50%; background:var(--accent);
         box-shadow:0 0 10px var(--accent); flex:0 0 auto; }
  h1 { margin:0; font-size:16px; font-weight:650; letter-spacing:.2px; }
  .sub { margin:0; font-size:12px; color:var(--muted); }

  /* Layout + cards */
  main { max-width:1040px; margin:0 auto; padding:24px; }
  section { background:var(--elevated); border:1px solid var(--border); border-radius:var(--r-md);
            padding:20px 20px 16px; margin:0 0 20px; box-shadow:0 6px 22px rgba(0,0,0,.35); }
  h2 { margin:0 0 16px; font-size:13px; font-weight:650; text-transform:uppercase;
       letter-spacing:.7px; color:var(--accent); }

  /* Form rows */
  .field { display:flex; flex-wrap:wrap; align-items:center; gap:8px; margin:0 0 10px; }
  label { flex:0 0 96px; color:var(--dim); font-size:12px; text-transform:uppercase;
          letter-spacing:.5px; }
  input { flex:1 1 220px; min-width:0; background:var(--field); color:var(--text);
          border:1px solid var(--border); border-radius:var(--r-sm); padding:8px 10px;
          font:14px var(--sans); transition:border-color .12s, box-shadow .12s; }
  input::placeholder { color:var(--muted); }
  input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }

  /* Buttons */
  button { flex:0 0 auto; background:var(--accent); color:var(--on-accent); border:0;
           border-radius:var(--r-sm); padding:8px 14px; cursor:pointer; font:600 13px var(--sans);
           transition:background .12s, transform .02s; }
  button:hover { background:var(--accent-hover); }
  button:active { background:var(--accent-press); transform:translateY(1px); }
  button.sec { background:var(--surface); color:var(--text); border:1px solid var(--border); }
  button.sec:hover { background:var(--surface-hover); }
  button.sec:active { background:var(--surface-press); }

  /* Tabs — segmented row with an accent underline on the active one */
  .tabs { display:flex; flex-wrap:wrap; gap:4px; margin:16px 0 4px;
          border-bottom:1px solid var(--border); }
  .tabs button { background:transparent; color:var(--dim); border:0; border-radius:0;
          padding:9px 14px; font:600 13px var(--sans); border-bottom:2px solid transparent;
          margin-bottom:-1px; }
  .tabs button:hover { color:var(--text); background:transparent; }
  .tabs button.active { color:var(--accent); border-bottom-color:var(--accent); }
  #panel { margin-top:14px; }

  /* Tables */
  table { border-collapse:collapse; width:100%; margin-top:10px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); font-size:13px; }
  th { color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.5px;
       font-size:11px; }
  tbody tr:hover, tr:hover { background:rgba(255,255,255,.02); }
  td button { padding:4px 10px; font-size:12px; }

  /* Bits */
  .muted { color:var(--muted); }
  .keys { display:block; font:12px/1.6 var(--mono); color:var(--success); word-break:break-all;
          background:var(--field); border:1px solid var(--border); border-radius:var(--r-sm);
          padding:10px 12px; margin-top:8px; }
  pre { font:12px/1.5 var(--mono) !important; }
  #toast { position:fixed; bottom:20px; right:20px; background:var(--surface);
           color:var(--text); border:1px solid var(--border); padding:11px 16px;
           border-radius:var(--r-sm); box-shadow:0 8px 24px rgba(0,0,0,.45);
           opacity:0; transform:translateY(6px); transition:opacity .18s, transform .18s;
           pointer-events:none; font-size:13px; }
  #toast.show { opacity:1; transform:translateY(0); }

  @media (max-width:560px) { label { flex-basis:100%; } main { padding:16px; } }
</style>
</head>
<body>
<header>
  <div class="bar">
    <span class="dot"></span>
    <div>
      <h1>Game BaaS</h1>
      <p class="sub">Operator dashboard</p>
    </div>
  </div>
</header>
<main>
  <section>
    <h2>Platform admin</h2>
    <div class="field"><label for="adminSecret">Admin secret</label>
      <input id="adminSecret" type="password" placeholder="X-Admin-Secret"></div>
    <div class="field"><label for="projName">New project</label>
      <input id="projName" type="text" placeholder="name">
      <button onclick="createProject()">Create</button>
      <button class="sec" onclick="listProjects()">List projects</button></div>
    <div id="projOut"></div>
  </section>

  <section>
    <h2>Project console</h2>
    <div class="field"><label for="baseUrl">Base URL</label>
      <input id="baseUrl" type="text" placeholder="(same origin)"></div>
    <div class="field"><label for="pubKey">Public key</label>
      <input id="pubKey" type="text" placeholder="X-Api-Key"></div>
    <div class="field"><label for="secKey">Secret key</label>
      <input id="secKey" type="password" placeholder="X-Secret-Key">
      <button onclick="saveKeys()">Save</button></div>
    <div class="tabs">
      <button data-tab="config" class="active" onclick="tab('config')">Config</button>
      <button data-tab="events" onclick="tab('events')">Live Events</button>
      <button data-tab="analytics" onclick="tab('analytics')">Analytics</button>
      <button data-tab="users" onclick="tab('users')">Users</button>
      <button data-tab="board" onclick="tab('board')">Leaderboard</button>
      <button data-tab="realtime" onclick="tab('realtime')">Realtime</button>
    </div>
    <div id="panel"></div>
  </section>
</main>
<div id="toast"></div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
const base = () => ($("baseUrl").value || "").replace(/\/$/, "");
const esc = (s) => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// Persist keys locally so a refresh keeps the console usable (never logged/sent elsewhere).
for (const id of ["baseUrl","pubKey","secKey","adminSecret"]) {
  $(id).value = localStorage.getItem("gbaas_"+id) || "";
  $(id).addEventListener("change", () => localStorage.setItem("gbaas_"+id, $(id).value));
}
function saveKeys(){ for (const id of ["baseUrl","pubKey","secKey"]) localStorage.setItem("gbaas_"+id,$(id).value); toast("keys saved"); }

let toastTimer;
function toast(msg){ const t=$("toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"),2200); }

async function api(method, path, body, headers) {
  const res = await fetch(base()+path, { method, headers: Object.assign({"Content-Type":"application/json"}, headers||{}),
    body: body!=null ? JSON.stringify(body) : undefined });
  let data = {}; try { data = await res.json(); } catch(e){}
  if (!res.ok) throw new Error((data.error && data.error.message) || ("HTTP "+res.status));
  return data;
}
const adminHdr  = () => ({ "X-Admin-Secret": $("adminSecret").value });
const projHdr   = () => ({ "X-Api-Key": $("pubKey").value, "X-Secret-Key": $("secKey").value });
const apiKeyHdr = () => ({ "X-Api-Key": $("pubKey").value });

// ---- platform ----
async function createProject(){
  try { const p = await api("POST","/v1/admin/projects",{name:$("projName").value},adminHdr());
    $("projOut").innerHTML = `<p class="muted">Created — save these now, the secret is shown once:</p>
      <p class="keys">public_key = ${esc(p.public_key)}<br>secret_key = ${esc(p.secret_key)}</p>`;
    toast("project created");
  } catch(e){ toast(e.message); } }
async function listProjects(){
  try { const r = await api("GET","/v1/admin/projects",null,adminHdr());
    $("projOut").innerHTML = rows(["id","name","public_key"], r.projects); }
  catch(e){ toast(e.message); } }

// ---- project console tabs ----
let current = "config";
function tab(name){ current=name; for (const b of document.querySelectorAll(".tabs button"))
  b.classList.toggle("active", b.dataset.tab===name); render(); }

function rows(cols, data){
  if (!data || !data.length) return '<p class="muted">(empty)</p>';
  return `<table><tr>${cols.map(c=>`<th>${c}</th>`).join("")}</tr>` +
    data.map(d=>`<tr>${cols.map(c=>`<td>${esc(d[c])}</td>`).join("")}</tr>`).join("") + `</table>`;
}

async function render(){
  const p = $("panel");
  try {
    if (current==="config") {
      const r = await api("GET","/v1/config",null,apiKeyHdr());
      const items = Object.entries(r.config||{}).map(([k,v])=>({key:k,value:v}));
      p.innerHTML = `<div><input id="ck" type="text" placeholder="key"> <input id="cv" type="text" placeholder="value">
        <button onclick="setConfig()">Set</button></div>` + tableWithDelete(["key","value"], items, "delConfig");
    } else if (current==="events") {
      const r = await api("GET","/v1/events",null,apiKeyHdr());
      p.innerHTML = `<div class="muted">Schedule (times "YYYY-MM-DD HH:MM:SS" UTC):</div>
        <div><input id="ek" type="text" placeholder="key"> <input id="en" type="text" placeholder="name"></div>
        <div><input id="es" type="text" placeholder="starts_at"> <input id="ee" type="text" placeholder="ends_at">
        <button onclick="createEvent()">Schedule</button></div>
        <div class="muted" style="margin-top:8px">Active now:</div>` + rows(["key","name","payload"], r.events);
    } else if (current==="analytics") {
      const r = await api("GET","/v1/admin/analytics/summary",null,projHdr());
      p.innerHTML = rows(["name","count"], r.counts);
    } else if (current==="users") {
      const r = await api("GET","/v1/admin/users",null,projHdr());
      p.innerHTML = rows(["id","email","display_name","is_guest"], r.users);
    } else if (current==="board") {
      const key = p.querySelector("#bk") ? p.querySelector("#bk").value : "colony_high";
      let entries = [];
      try { entries = (await api("GET","/v1/leaderboards/"+encodeURIComponent(key)+"/top?limit=20",null,apiKeyHdr())).entries; } catch(e){}
      p.innerHTML = `<div><input id="bk" type="text" value="${esc(key)}"> <button onclick="render()">Load</button></div>`
        + rows(["rank","display_name","value","user_id"], entries);
    } else if (current==="realtime") {
      // A live WebSocket console for /v1/ws (Lobby + Matchmaking). Uses the
      // browser's native WebSocket — connects as a guest of the console's project.
      p.innerHTML = `
        <div><button onclick="rtConnect()">Connect (guest)</button>
             <button class="sec" onclick="rtDisconnect()">Disconnect</button>
             <span id="rtstate" class="muted"> ${rtSock ? "● connected" : "○ not connected"}</span></div>
        <div style="margin-top:8px"><input id="rtroom" type="text" value="lobby-1" placeholder="room">
             <button onclick="rtSend({op:'join',room:$('rtroom').value})">Join</button>
             <button class="sec" onclick="rtSend({op:'leave'})">Leave</button></div>
        <div style="margin-top:6px"><input id="rtmsg" type="text" placeholder="message to the room">
             <button onclick="rtSend({op:'msg',data:$('rtmsg').value})">Send</button></div>
        <div style="margin-top:6px"><button onclick="rtSend({op:'queue'})">Queue for match</button>
             <button class="sec" onclick="rtSend({op:'cancel'})">Cancel</button>
             <span class="muted"> (open two tabs and queue in both → matched)</span></div>
        <pre id="rtlog" style="margin-top:10px;max-height:220px;overflow:auto;background:#0e1016;
             padding:8px;border-radius:6px;font-size:12px;white-space:pre-wrap"></pre>`;
    }
  } catch(e){ p.innerHTML = `<p class="muted">${esc(e.message)}</p>`; }
}

// ---- realtime (WebSocket) console ----
let rtSock = null;
function rtLog(line){ const el=$("rtlog"); if(el){ el.textContent += line+"\n"; el.scrollTop = el.scrollHeight; } }
function rtState(s){ const el=$("rtstate"); if(el) el.textContent = " "+s; }
async function rtConnect(){
  if (rtSock){ toast("already connected"); return; }
  try {
    const g = await api("POST","/v1/auth/guest",{},apiKeyHdr());   // mint a guest token
    const httpBase = base() || location.origin;
    const url = httpBase.replace(/^http/,"ws") + "/v1/ws?api_key=" +
                encodeURIComponent($("pubKey").value) + "&token=" + encodeURIComponent(g.access_token);
    rtSock = new WebSocket(url);
    rtSock.onopen    = ()=>{ rtLog("● connected"); rtState("● connected"); };
    rtSock.onmessage = (e)=> rtLog("← "+e.data);
    rtSock.onclose   = ()=>{ rtLog("○ closed"); rtState("○ not connected"); rtSock=null; };
    rtSock.onerror   = ()=> rtLog("! socket error");
  } catch(e){ toast(e.message); }
}
function rtDisconnect(){ if(rtSock) rtSock.close(); }
function rtSend(obj){
  if (!rtSock || rtSock.readyState!==1){ toast("not connected"); return; }
  const s = JSON.stringify(obj); rtSock.send(s); rtLog("→ "+s);
}

function tableWithDelete(cols, data, fn){
  if (!data || !data.length) return '<p class="muted">(empty)</p>';
  return `<table><tr>${cols.map(c=>`<th>${c}</th>`).join("")}<th></th></tr>` +
    data.map(d=>`<tr>${cols.map(c=>`<td>${esc(d[c])}</td>`).join("")}`+
      `<td><button class="sec" onclick="${fn}('${esc(d.key)}')">delete</button></td></tr>`).join("") + `</table>`;
}
async function setConfig(){ try{ await api("PUT","/v1/admin/config/"+encodeURIComponent($("ck").value),{value:$("cv").value},projHdr()); toast("set"); render(); }catch(e){toast(e.message);} }
async function delConfig(k){ try{ await api("DELETE","/v1/admin/config/"+encodeURIComponent(k),null,projHdr()); toast("deleted"); render(); }catch(e){toast(e.message);} }
async function createEvent(){ try{ await api("POST","/v1/admin/events",
  {key:$("ek").value,name:$("en").value,starts_at:$("es").value,ends_at:$("ee").value,payload:"{}"},projHdr());
  toast("scheduled"); render(); }catch(e){toast(e.message);} }

render();
</script>
</body>
</html>
